<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playlist Digger</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="container">
      <div id="auth-section" class="hidden">
        <div class="hero">
          <h1>Playlist Digger</h1>
          <p class="tagline">Find your Spotify playlist tracks on Bandcamp, Beatport & SoundCloud</p>
          <a id="login-btn" href="/api/auth/login" class="btn spotify-btn">Login with Spotify</a>
        </div>
      </div>

      <div id="app-section" class="hidden">
        <header class="top-bar">
          <h1>Playlist Digger</h1>
          <a id="logout-btn" href="/api/auth/logout" class="logout-link">Logout</a>
        </header>

        <form id="search-form" class="search-box">
          <input
            type="text"
            id="playlist-url"
            placeholder="Paste Spotify playlist URL..."
            required
          />
          <button type="submit" id="search-btn">Search</button>
        </form>

        <div id="status" class="status"></div>

        <div id="progress-bar" class="progress-bar hidden">
          <div id="progress-fill" class="progress-fill"></div>
        </div>

        <div id="results-section" class="hidden">
          <div class="results-header">
            <span id="results-count" class="results-count"></span>
            <button type="button" id="copy-links-btn" class="copy-btn hidden">Copy all links</button>
            <button type="button" id="open-all-bandcamp" class="open-all-btn copy-btn hidden" data-source="bandcamp">Open all Bandcamp tabs</button>
            <button type="button" id="open-all-beatport" class="open-all-btn copy-btn hidden" data-source="beatport">Open all Beatport tabs</button>
            <button type="button" id="open-all-soundcloud" class="open-all-btn copy-btn hidden" data-source="soundcloud">Open all SoundCloud tabs</button>
          </div>
          <div class="table-wrap">
            <table id="results">
              <thead>
                <tr>
                  <th class="col-num">#</th>
                  <th>Artist</th>
                  <th>Track</th>
                  <th>Bandcamp</th>
                  <th>Beatport</th>
                  <th>SoundCloud</th>
                </tr>
              </thead>
              <tbody id="results-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
